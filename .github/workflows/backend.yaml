name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**" # Highly recommended to uncomment this so backend only deploys when backend files change

jobs:
  deploy:
    name: Install and build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      # Note: If your package.json doesn't have a "build" script (e.g., if you are running pure JS files),
      # you can completely delete this build step.
      - name: Build Project
        working-directory: ./backend
        run: npm run build

      # 🔥 THE MISSING STEP: Deploy to Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ./backend
