name: Backend CI/CD

on:
  push:
    branches:
      - main
    # paths:
    #   - "backend/**"

jobs:
  deploy:
    name: Install and build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build Project
        working-directory: ./backend
        run: npm run build
